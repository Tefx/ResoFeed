<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Source Ledger Visual Audit Harness</title>
    <script type="module" src="/src/app.css"></script>
    <script type="module" src="./source-ledger-visual-harness.ts"></script>
    <style>
      body { margin: 0; background: var(--rf-color-background); color: var(--rf-color-text); }
      main.audit-harness { max-width: 960px; margin: 0 auto; padding: 32px; }
      .audit-section { margin-block-end: 32px; border: 1px solid var(--rf-color-border); background: var(--rf-color-surface); }
      .audit-label { margin: 0; padding: 8px 16px; border-block-end: 1px solid var(--rf-color-border); font: var(--rf-typography-metadata); letter-spacing: 0.08em; text-transform: uppercase; color: var(--rf-color-muted); }
    </style>
  </head>
  <body>
    <main class="audit-harness" aria-label="Source Ledger visual audit harness">
      <section class="audit-section" data-audit-state="default"><p class="audit-label">default</p><div id="default"></div></section>
      <section class="audit-section" data-audit-state="source-fetch-active"><p class="audit-label">source fetch active</p><div id="source-fetch-active"></div></section>
      <section class="audit-section" data-audit-state="global-ingest-active"><p class="audit-label">global ingest active</p><div id="global-ingest-active"></div></section>
      <section class="audit-section" data-audit-state="completion"><p class="audit-label">completion timestamps</p><div id="completion"></div></section>
      <section class="audit-section" data-audit-state="error-conflict"><p class="audit-label">error / conflict terse text</p><div id="error-conflict"></div></section>
      <section class="audit-section" data-audit-state="hover-focus"><p class="audit-label">hover / focus target</p><div id="hover-focus"></div></section>
    </main>
  </body>
</html>
