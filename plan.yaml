      no queues, no ingest ledger, no sync/merge semantics.

      - Preserve one in-process ingest concurrency guard across background ingest,
      global manual ingest, and per-source fetch. Conflict remains `409 conflict`
      and must be translatable to raw `err: ingest already running` UI text.

      - Ensure source-level fetch responses update source diagnostics/status according
      to ARCHITECTURE failure contract.


      Failure-mode checklist:

      - missing source / deleted source returns `404 not_found` for per-source fetch;

      - invalid body or query parameters return `400 bad_request`;

      - guard conflict returns `409 conflict` without queuing or retry persistence;

      - source RSS failure updates source diagnostics but does not block other sources;

      - backend timestamps remain RFC3339 UTC; UI-only `HH:MM:SS` strings are not
      persisted or sent back.


