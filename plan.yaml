  diagnostics, and frontend contract delta. Architecture basis readiness is READY;
  Contract-First Fit is HIGH per user-provided spec-readiness audit.
project_guidance: 'ResoFeed project guidance: docs/ARCHITECTURE.md and docs/DESIGN.md
  are canonical. Preserve the one-deployable Go binary (`cmd/resofeed`) serving static
  assets, JSON HTTP, MCP Streamable HTTP at `/mcp`, and background ingest loop. Use
  one SQLite database with FTS5 only; no vector DB, embeddings, RAG, sync coordinator,
  state merger, conflict resolver, activity ledger, command history, reading history,
  portable agent receipts, service/repository/DI/event-bus layering, or sidecar workers.
  OpenRouter is JSON-in/JSON-out utility only and never owns durable state or writes
  DB directly. Owner token is the sole auth boundary; `actor_id` is provenance/idempotency
  only. HTTP and MCP must expose equivalent product operations and strict validation,
  including unknown JSON body fields as `400 bad_request`. Processing language is
  runtime metadata excluded from state export/import; source identifiers/provenance
  must remain exact and non-localized. UI must follow DESIGN.md: low-chrome analyst
  workbench, no settings dashboard/onboarding wizard, bracket actions, split desktop
  feed/Inspector scroll, source identifiers marked `translate="no"` or equivalent,
  and no forbidden SaaS/product concepts.'
