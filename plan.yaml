      ## Fix Evidence


      **Blocker addressed**: B-GATE-001


      **Root cause vs symptom**:

      - Root cause: Inspector heading autofocus was tied to reactive `item && focusHeading`.
      Opening the Inspector for an already-selected/summary item could allow the test
      to focus the original link while async inspect/detail load was still completing;
      when `selectedItemDetail` replaced the summary, the Inspector effect ran again
      and stole focus back to the heading. That made original-link focus assertion
      order-dependent under the comprehensive suite.

      - Symptom: `keyboard-a11y.expected-red.spec.ts:78` failed in the comprehensive
      targeted suite because `focusAndAudit` expected the `original link` locator
      to be focused, but `document.activeElement` became inactive/another element
      after async Inspector detail hydration.

      - Why this fix is not surface-level: focus assertions were not weakened. UI
      now models Inspector heading focus as a one-shot open request (`focusRequestId`)
      instead of a side effect of every item/detail data refresh. Inspector still
      moves focus to detail heading on open per DESIGN.md, but later async detail
      hydration no longer steals focus from keyboard users/tests focusing original
      link.


      **Action Summary**:

      - Added one-shot Inspector focus request id in `+page.svelte`.

      - Moved `currentSurface = ''inspector''` before async inspect/detail work so
      opening behavior is immediate and deterministic.

      - Updated `Inspector.svelte` to consume each focus request once, preserving
      heading autofocus on open without refocusing on every item/detail update.


