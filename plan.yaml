  Go binary, SQLite-only storage, Gemini JSON-transform role, owner-token delegation
  boundary, active-state JSON backup/restore model, and DESIGN.md UI contract. Do
  not introduce sync/merge engines, vector DBs/RAG, account systems, repositories/service
  layers, event buses, settings dashboards, or UI patterns forbidden by the docs.
