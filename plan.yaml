      - Add runtime secret resolution before LLM provider construction.

      - Support `GEMINI_API_KEY` from OS environment and local `.env` fallback.

      - Preserve existing current Gemini CLI secret flag behavior only as a compatibility
      override if it already exists; document CLI secret flags as discouraged and
      transitional rather than silently removing current behavior in this inserted
      phase.

      - Precedence: explicit current CLI flag value, if still present, overrides OS
      environment; OS environment overrides `.env`; `.env` is fallback; empty or whitespace
      values are invalid.

      - Any decision to deprecate/remove the current Gemini CLI key flag in this phase
      is an architecture decision requiring user confirmation; do not make that change
      silently.


      Contract to lock for future OpenRouter migration:

      - OpenRouter work must reuse this secret-source contract instead of requiring
      CLI-passed API keys.

      - OpenRouter contract should lock `OPENROUTER_KEY` and/or `OPENROUTER_API_KEY`
      naming explicitly before implementation.

      - Future live smoke must use `.env` or OS environment with redacted evidence
      only.

      - Future docs must not regress to requiring CLI secret flags or examples that
      put API keys in shell history.


      `.env` parsing contract:

      - Minimal parser only: `KEY=VALUE` lines, ignore blank lines and `#` comments.

      - No shell expansion, no command substitution, no command execution, no sourcing
      shell scripts.

      - Values are trimmed only according to the locked contract; empty/whitespace-only
      values are invalid.

      - Parser errors must not include secret values.


      This CONTRACT step may update docs/instructions/contracts only. It MUST NOT
      ship runnable resolver logic or provider construction changes.'
