      Complete backend/runtime support required by audit issues 1, 2, and 4.


      Scope:

      - Ensure `GET /api/sources` exposes raw source diagnostics needed by Source
      Ledger to render literal `err: <diagnostic>` adjacent to affected rows. Prefer
      an explicit nullable diagnostic/error field consistent with existing `sources.last_fetch_error`;
      do not invent friendly copy.

