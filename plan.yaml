      - `MarkItemInspected` persists item state only and has no idempotency key read/write
      at `internal/resofeed/ranking.go:142-160`.

      - `SetItemResonance` persists item state only and always returns `AlreadyApplied:
      false` at `internal/resofeed/ranking.go:172-182`.

