  - id: runtime-api-and-mcp-integration.fix-runtime-verification-blockers
    name: Fix runtime verification blockers
    status: done
    description: 'step_type: implementation

      agent_source: default

      rework_context: batched remediation for failed runtime verification cluster


      Fix ALL runtime verification blockers found by liveness, spec-conformance, and
      wiring-audit. This is one batched remediation step; do not create sibling fix
      loops.


      ## Blockers to Fix (ALL of these, not just the first)


      ### B1_static_ui_root_returns_plain_text_not_html

      Serve built web/static assets from `web/build` or the contract-correct static
      output so `GET /` returns HTML/static UI after the documented web build. The
      root response MUST expose the documented static web UI surface including the
      owner-token prompt/interactive content. Preserve ResoFeed design constraints:
      no SaaS onboarding, no accounts, no sync concepts, no friendly AI-magic copy.


      ### B2_mcp_tools_list_schemas_skeletal

      Complete MCP `tools/list` input schemas for every documented tool. Schemas MUST
      expose required fields, defaults, bounds/limits, and documented field semantics
      per `docs/ARCHITECTURE.md` and `docs/USAGE.md`; do not leave skeletal `{}` or
      underspecified schemas.


      ### B3_mcp_steer_drops_configured_gemini

      Pass the configured Gemini runtime dependency through MCP wiring. Extend the
      runtime chain so `NewRouter` / `NewMCPHandler` receive the configured Gemini
      and MCP `steer` uses it, preserving owner-token authorization, actor/idempotency
      receipts, and HTTP/MCP operation parity. Current failure evidence: `NewRouter`
      calls `NewMCPHandler(MCPConfig{DB, OwnerToken, OwnerTokenHash})`; `MCPConfig`
      lacks Gemini; `SteerForMCP` calls `ApplySteering(ctx, db, nil, ...)` while HTTP
      steer uses `h.cfg.Gemini`.


      ### B4_stale_expected_stub_debt_contract_tests

      Remove or replace stale skipped HTTP/MCP expected-stub-debt contract tests in
      `internal/resofeed/backend_contract_test.go:20-68,246-265` now that runtime
      HTTP/MCP surfaces are implemented. Prefer converting them into active assertions
      for the implemented runtime surfaces. The final test suite MUST NOT preserve
      skip text that says HTTP/MCP runtime is expected stub debt.


      ### B5_startup_and_listener_runtime_proof_gaps

      Add runtime proof/tests for:

      - startup validation no-bind matrix: invalid addr, invalid public URL, invalid
      DB path/config, invalid Gemini config, invalid/absent token cases fail before
      socket bind

      - startup order/liveness: startup validates config before bind, then serves
      HTTP/API/MCP and shuts down cleanly

      - first-run owner-token generation/reuse at process level

      - real bound-listener `/mcp` Streamable HTTP proof, including non-local in-process
      listener evidence rather than handler-only tests


      ## Runtime Surface Preservation

      This step remediates a deployability-bearing surface. Handler-only fixes are
      insufficient. Preserve the single Go binary (`cmd/resofeed`) serving static
      assets, JSON HTTP, MCP Streamable HTTP, and background ingest loop. Do not introduce
      sidecars, sync servers, account systems, vector DBs, or agent registries.


      ## Completion Criteria (stub exclusion)

      This is an IMPLEMENTATION step. Stub-only completion is NOT acceptable. Each
      deliverable MUST contain substantive logic that processes its inputs and produces
      outputs that vary based on those inputs. Private stub/placeholder code paths
      are structurally restricted from satisfying this requirement.


      ## Gate Preview (what the gate WILL reject)

      1. `GET /` returning `text/plain` or only `RESOFEED` after documented web build.

      2. MCP `tools/list` schemas missing documented required fields/defaults/limits.

      3. MCP `steer` bypassing configured Gemini or diverging from HTTP steer semantics.

      4. Skipped tests preserving expected runtime HTTP/MCP stub debt.

      5. Startup tests that bind a socket before rejecting invalid configuration.

      6. MCP proof that exercises only handlers instead of a real bound Streamable
      HTTP listener.'
