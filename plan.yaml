      - Rendered UI evidence or test output proving top-level nav contains only allowed
      surfaces.


      ### B2: Agent steering attribution not visible to human

      Backend stores actor attribution on steering rules, but UI receipt text only
      says `applied: ...`; no runtime proof covers MCP-agent receipt surfacing to
      the human on next UI interaction.

      Required remediation:

      - Make delegated/MCP agent steering attribution visible to the human on the
      next relevant UI interaction without introducing user accounts, per-agent auth,
      or a portable activity feed.

      - Preserve owner-token boundary: actor_id is provenance/idempotency only, not
