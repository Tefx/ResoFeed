      attribution/receipt in the UI or permitted surface.

      Expected artifacts:

      - Backend/API/MCP/UI wiring changes if needed.

      - Runtime proof showing agent-originated steering attribution visible to a human.


      ### B3: System-level PRD acceptance criteria remain unproven

      Several behavioral ACs remain unproven at system level, especially AC-4 strict
      filter/boost execution, AC-5 controversial-inspection non-preference behavior,
      MCP delivery/candidate resurfacing, and related HTTP/MCP/UI cross-surface behavior.

      Required remediation:

      - Add or repair system-level proof coverage for AC-4 strict filter/boost execution.

      - Add or repair system-level proof coverage for AC-5 inspect/controversial-item
      behavior proving inspection does not create a preference signal.

      - Add or repair MCP delivery/candidate resurfacing cross-surface evidence.

      - Ensure evidence exercises real runtime paths rather than mock-only tests.

      Expected artifacts:

      - Tests or scripts with real server/API/MCP/UI path evidence.

      - Behavioral proof register entries for each AC with status PROVEN or explicit
      closure path.


      ### W1: `items.value_tier` is write-only in production scope

      Schema declares items.value_tier; Gemini output writes Item.ValueTier; persistence
      writes it. No production read path in ListTodayFeed, SearchItems, ReadItemDetail,
      HTTP JSON types, MCP result types, or frontend API contract exposes/consumes
